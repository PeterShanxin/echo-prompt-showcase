<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="1" stop-color="#101B2E"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#12233C"/>
      <stop offset="1" stop-color="#0D182A"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D5CFF"/>
      <stop offset="1" stop-color="#3A9BFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11C5BF"/>
      <stop offset="1" stop-color="#0E8EEA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#02060D" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11V1Z" fill="#78B7FF"/>
    </marker>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="1112" cy="126" r="180" fill="#12305A" opacity="0.18"/>
  <circle cx="158" cy="610" r="210" fill="#1C4D90" opacity="0.16"/>

  <text x="88" y="96" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Echo Prompt</text>
  <text x="88" y="134" fill="#9DB3CC" font-family="Segoe UI, Arial, sans-serif" font-size="20">High-level system architecture</text>

  <rect x="84" y="204" width="242" height="132" rx="24" fill="url(#panel)" stroke="#28486C" stroke-width="2" filter="url(#shadow)"/>
  <text x="116" y="250" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Builders</text>
  <text x="116" y="285" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Product, ML, and platform teams</text>
  <text x="116" y="313" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">define and update prompt assets</text>

  <rect x="84" y="404" width="242" height="132" rx="24" fill="url(#panel)" stroke="#28486C" stroke-width="2" filter="url(#shadow)"/>
  <text x="116" y="450" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Release Workflows</text>
  <text x="116" y="485" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">CI, review, and approval paths</text>
  <text x="116" y="513" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">govern how changes move live</text>

  <rect x="410" y="156" width="456" height="410" rx="34" fill="url(#core)" filter="url(#shadow)"/>
  <rect x="438" y="216" width="400" height="80" rx="20" fill="#0D1B2D" opacity="0.92"/>
  <rect x="438" y="314" width="190" height="94" rx="20" fill="#102338" opacity="0.94"/>
  <rect x="648" y="314" width="190" height="94" rx="20" fill="#102338" opacity="0.94"/>
  <rect x="438" y="426" width="190" height="94" rx="20" fill="#102338" opacity="0.94"/>
  <rect x="648" y="426" width="190" height="94" rx="20" fill="#102338" opacity="0.94"/>

  <text x="458" y="191" fill="#EAF3FF" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">Echo Prompt control plane</text>
  <text x="466" y="264" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Asset registry and release state</text>
  <text x="466" y="352" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Asset registry</text>
  <text x="466" y="382" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Prompts, context, skills, workflows</text>
  <text x="676" y="352" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Version lifecycle</text>
  <text x="676" y="382" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Draft, approved, active, deprecated</text>
  <text x="466" y="464" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Change governance</text>
  <text x="466" y="494" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Review, promotion, release controls</text>
  <text x="676" y="464" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Execution telemetry</text>
  <text x="676" y="494" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Latency, usage, traceability</text>

  <rect x="946" y="204" width="248" height="132" rx="24" fill="url(#panel)" stroke="#28486C" stroke-width="2" filter="url(#shadow)"/>
  <text x="978" y="250" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Application services</text>
  <text x="978" y="285" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Consume approved assets through</text>
  <text x="978" y="313" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">a stable service boundary</text>

  <rect x="946" y="404" width="248" height="132" rx="24" fill="url(#panel)" stroke="#28486C" stroke-width="2" filter="url(#shadow)"/>
  <text x="978" y="450" fill="#F4F7FB" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Runtime feedback</text>
  <text x="978" y="485" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Execution signals return for</text>
  <text x="978" y="513" fill="#AFC3D8" font-family="Segoe UI, Arial, sans-serif" font-size="18">review and iteration</text>

  <path d="M326 270H392" stroke="#78B7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M326 470H392" stroke="#78B7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M866 270H928" stroke="#78B7FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M946 470H896C878 470 866 458 866 440V432" stroke="#6AD7D2" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="84" y="602" width="1112" height="58" rx="18" fill="#0D182A" stroke="#244461"/>
  <text x="114" y="638" fill="#B7C8D9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Purpose: separate prompt asset operations from application delivery while making changes easier to review, release, and observe.</text>
</svg>
